<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <div id="root"></div>

    <script src="./lib//babel/babel.min.js"></script>
    <script type="text/babel" data-type="module" data-presets="env,react">

        /** @jsx createElement */
        /** @jsxFrag Fragment */
        const ReactElement=Symbol.for('ReactElement')
        const Fragment=1
        function createElement(type, config, ...children) {
            const props = {}
            let key=null,ref=null
            if (config) {
                if (config.key) {
                    key = config.key+''
                }
                if (config.ref) {
                    ref = config.ref
                }
                for (const key of Object.keys(config)) {
                    if (key !== 'key' && key !== 'ref') {
                        props[key] = config[key]
                    }
                }
            }
            if(children.length===1){
                props.children = children[0]
            }else if(children.length>0){
                props.children = children
            }

            return {
                $$typeof: ReactElement,
                type,
                key,
                ref,
                props
            }
        }
        function createFiber(tag,pendingProps,key){
             return {
                 // instance
                 tag,
                 type:null,
                 stateNode:null,
                 key,

                 // fiber
                 return:null,
                 sibling:null,
                 child:null,
                 index:0,

                 // state
                 pendingProps,
                 memoizedProps:null,
                 memoizedState:null,
                 updateQueue:null,
                 
                 alternate:null
             }
        }

    //    render(<App></App>, document.querySelector('#root'))
    </script>
</body>

</html>
