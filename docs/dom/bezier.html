<body>
    <canvas id="canvas" width="800" height="800"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const viewport={
            x:0,
            y:0,
            width:canvas.width,
            height:canvas.height, 
        }
        function mapScreenToCanvas(x, y) {
            return {
                x: viewport.x,
                y: y - canvas.offsetTop
            }
        }
    </script>
</body>
