<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* 2 跳跃点 */
        .b3-mask {
            position: absolute;
            background-color: #fff;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 99999;
        }

        .b3-mask-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            flex-direction: column;
        }

        .b3-mask-content-text {
            font-size: 16px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 32px;
        }

        .b3-bouncing-dots {
            display: flex;
            gap: 12px;
        }

        .b3-bouncing-dots span {
            width: 14px;
            height: 14px;
            background: #3b82f6;
            border-radius: 50%;
            animation: b3-bounce 0.6s infinite alternate;
        }

        .b3-bouncing-dots span:nth-child(2) {
            animation-delay: 0.2s;
            background: #60a5fa;
        }

        .b3-bouncing-dots span:nth-child(3) {
            animation-delay: 0.4s;
            background: #93c5fd;
        }

        @keyframes b3-bounce {
            100% {
                transform: translateY(-18px);
            }
        }

        .b3-mask-content-text>span {
            opacity: 1;

        }

        .b3-mask-content-text>span:nth-child(1) {
            animation: b3-ellipsis 2s ease-in-out 0s infinite;
        }

        .b3-mask-content-text>span:nth-child(2) {
            animation: b3-ellipsis 2s ease-in-out 0.3s infinite;
        }

        .b3-mask-content-text>span:nth-child(3) {
            animation: b3-ellipsis 2s ease-in-out 0.6s infinite;
        }

        @keyframes b3-ellipsis {

            0%,
            30% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }

            70%,
            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="b3-mask">
        <div class="b3-mask-content">
            <div class="b3-mask-content-text">系统依赖资源加载中<span>.</span><span>.</span><span>.</span></div>
            <div class="b3-bouncing-dots"><span></span><span></span><span></span></div>
        </div>
    </div>
</body>

</html>
